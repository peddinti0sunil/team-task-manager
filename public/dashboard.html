<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Team Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, sans-serif; background: #f0f2f5; }

    nav {
      background: #4f46e5;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav span { font-size: 1.2rem; font-weight: bold; }

    nav div { display: flex; gap: 1rem; align-items: center; }

    nav a {
      color: white;
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.2);
    }

    nav button {
      padding: 0.4rem 0.8rem;
      background: white;
      color: #4f46e5;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .container { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    h2 { margin-bottom: 1.5rem; color: #333; }

    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card h3 { font-size: 2rem; color: #4f46e5; }
    .card p { color: #666; margin-top: 0.5rem; }

    /* Task Table */
    .section {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .section h2 { margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
    }

    th { background: #f8f8f8; color: #555; }

    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .todo { background: #fef3c7; color: #92400e; }
    .in-progress { background: #dbeafe; color: #1e40af; }
    .done { background: #d1fae5; color: #065f46; }
    .overdue { background: #fee2e2; color: #991b1b; }

    select {
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 0.85rem;
    }
    .priority-low { background: #d1fae5; color: #065f46; }
    .priority-medium { background: #fef3c7; color: #92400e; }
    .priority-high { background: #fee2e2; color: #991b1b; }
      
  </style>
</head>
<body>

  <!-- NAV BAR -->
  <nav>
    <span>Team Task Manager</span>
    <div>
      <span id="welcomeUser"></span>
      <a href="/tasks.html" id="tasksLink">Manage Tasks</a>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">

    <!-- STATS CARDS -->
    <div class="stats">
      <div class="card">
        <h3 id="totalTasks">0</h3>
        <p>Total Tasks</p>
      </div>
      <div class="card">
        <h3 id="todoCount">0</h3>
        <p>To Do</p>
      </div>
      <div class="card">
        <h3 id="inProgressCount">0</h3>
        <p>In Progress</p>
      </div>
      <div class="card">
        <h3 id="doneCount">0</h3>
        <p>Done</p>
      </div>
    </div>

    <!-- TASKS PER USER (admin only) -->
<div class="section" id="tasksByUserSection" style="display:none">
  <h2>Tasks Per User</h2>
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Total Tasks</th>
      </tr>
    </thead>
    <tbody id="tasksByUserBody">
    </tbody>
  </table>
</div>

    <!-- TASKS TABLE -->
    <div class="section">
      <h2>My Tasks</h2>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Due Date</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Update Status</th>
          </tr>
        </thead>
        <tbody id="tasksTableBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- OVERDUE TASKS -->
    <div class="section">
      <h2>⚠️ Overdue Tasks</h2>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Due Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="overdueTableBody">
          <tr><td colspan="3">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    // Check if user is logged in
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = '/index.html';
    }

    // Show welcome message
    document.getElementById('welcomeUser').innerText = 'Hi, ' + user.name;

   

    // Logout
    function logout() {
      localStorage.clear();
      window.location.href = '/index.html';
    }

    // Load dashboard data
    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        const data = await res.json();

        // Fill stats cards
        document.getElementById('totalTasks').innerText = data.total;
        document.getElementById('todoCount').innerText = data.statusCounts.todo;
        document.getElementById('inProgressCount').innerText = data.statusCounts['in-progress'];
        document.getElementById('doneCount').innerText = data.statusCounts.done;
        // Fill tasks per user (admin only)
if (data.tasksByUser && data.tasksByUser.length > 0) {
  document.getElementById('tasksByUserSection').style.display = 'block';
  document.getElementById('tasksByUserBody').innerHTML = data.tasksByUser.map(u => `
    <tr>
      <td>${u.name}</td>
      <td>${u.task_count}</td>
    </tr>
  `).join('');
}

        // Fill tasks table
        const tbody = document.getElementById('tasksTableBody');
        if (data.tasks.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5">No tasks found</td></tr>';
        } else {
          tbody.innerHTML = data.tasks.map(task => `
            <tr>
              <td>${task.title}</td>
              <td>${task.description || '-'}</td>
              <td>${task.due_date || '-'}</td>
              <td><span class="badge priority-${task.priority || 'medium'}">${task.priority || 'medium'}</span></td>
              <td><span class="badge ${task.status}">${task.status}</span></td>
              <td>
                <select onchange="updateStatus(${task.id}, this.value)">
                  <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>To Do</option>
                  <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                  <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
                </select>
              </td>
            </tr>
          `).join('');
        }

        // Fill overdue table
        const overdueBody = document.getElementById('overdueTableBody');
        if (data.overdue.length === 0) {
          overdueBody.innerHTML = '<tr><td colspan="3">No overdue tasks 🎉</td></tr>';
        } else {
          overdueBody.innerHTML = data.overdue.map(task => `
            <tr>
              <td>${task.title}</td>
              <td>${task.due_date}</td>
              <td><span class="badge overdue">${task.status}</span></td>
            </tr>
          `).join('');
        }

      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    // Update task status
    async function updateStatus(taskId, newStatus) {
      try {
        const res = await fetch(`/api/tasks/${taskId}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ status: newStatus })
        });

        if (res.ok) {
          loadDashboard(); // Refresh the data
        } else {
          alert('Failed to update status');
        }
      } catch (err) {
        alert('Server error');
      }
    }

    // Run on page load
    loadDashboard();
  </script>

</body>
</html>
